<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PCProtect ChatBot</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🛡️</text></svg>">
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="chatbot-popup.css">
    <link rel="stylesheet" href="phone-call.css">
</head>
<body>
    <div class="container">
        <header class="hero">
            <h1>Welcome to PCProtect ChatBot</h1>
            <p>Your AI-powered computer protection assistant</p>
        </header>

        <main class="main-content">
            <button class="action-button" id="mainButton">
                Get Started
            </button>
        </main>
    </div>

    <script>
        // Unregister any existing service workers that might be interfering
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.getRegistrations().then(function(registrations) {
                for(let registration of registrations) {
                    registration.unregister();
                    console.log('Service worker unregistered');
                }
            });
        }
    </script>
    <script src="chatgpt-service.js"></script>
    <script src="tts-service.js"></script>
    <script src="chatbot-popup.js"></script>
    <script src="phone-call.js"></script>
    <script src="script.js"></script>
</body>
</html>
